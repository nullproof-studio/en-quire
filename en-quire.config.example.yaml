# en-quire configuration
# Copy this file to en-quire.config.yaml and adjust as needed.

# Document roots — named mount points into en-quire's unified namespace.
# Each root has its own path, git config, and description.
# Files are addressed with a root prefix: docs/article.md, skills/triage.md
document_roots:
  docs:
    path: /data/docs
    description: "Main documentation"
    git:
      # enabled: null                 # Auto-detect (checks for .git directory)
      auto_commit: true               # Commit on every write operation
      remote: null                    # Optional: push proposals to remote
      pr_hook: null                   # Optional: webhook URL or shell command run after a propose write
      pr_hook_secret: null            # Optional: HMAC-SHA256 secret signing webhook bodies (X-EnQuire-Signature)

  # Example: a second root for agent skill files
  # skills:
  #   path: /data/skills
  #   description: "Agent skill files — governed"
  #   git:
  #     enabled: true
  #     auto_commit: true

  # Example: a root without git (session memory, scratch)
  # memory:
  #   path: /data/memory
  #   description: "Session memory files"
  #   git:
  #     enabled: false

# Database path (defaults to .enquire.db next to this config file)
# database: /data/enquire.db

# Optimistic locking — require agents to pass an ETag (from a prior read) on writes.
# Prevents stale writes and writes without reading. Agents receive the etag from
# doc_outline, doc_read_section, doc_read, or doc_find_replace preview.
require_read_before_write: true     # default: true. Set false to disable.

# Server transport
transport: stdio                    # stdio | streamable-http
port: 3100                          # Port for streamable-http transport

# HTTP bind interface. Defaults to loopback so flipping to streamable-http
# doesn't accidentally expose the server on every interface. Override to
# "0.0.0.0" only if you intend network exposure — in that case every
# caller MUST have a strong `key` (enforced at startup, min 32 chars).
listen_host: "127.0.0.1"

# Search configuration. SQLite FTS5 is always on; semantic search is opt-in.
search:
  sync_on_start: blocking           # "blocking" (default) or "background" (use for 100k+ docs)
  batch_size: 500                   # Files per index transaction batch
  semantic:
    enabled: false                  # Opt-in semantic vector search (sqlite-vec + OpenAI-compatible embeddings)
    # Base URL of an OpenAI-compatible embeddings endpoint. The client
    # appends "/embeddings". Examples:
    #   OpenAI:           https://api.openai.com/v1
    #   LM Studio:        http://localhost:1234/v1
    #   Ollama (compat):  http://localhost:11434/v1
    #   text-embeddings-inference:  http://localhost:8080
    endpoint: "https://api.openai.com/v1"
    model: "text-embedding-3-small" # 1536 dims hosted; nomic-embed-text (768) on local servers
    dimensions: 1536
    # Auth: prefer api_key_env so secrets stay out of committed config.
    # If both are set, the env var wins.
    api_key: null
    api_key_env: null               # e.g. "OPENAI_API_KEY"

# Citation feature (doc_cite + doc_cite_reverify). Off by default — opt in
# explicitly. The whole subsystem is verbatim source-span attestation, NOT
# semantic truth verification: the agent submits a quote, the tool re-fetches
# the source independently and confirms or denies a verbatim match.
#
# Web citation is a governed network-egress capability — strictly:
#   * `cite_web` permission must be granted to the caller (see callers below).
#   * `fetch.http_allowlist` MUST list explicit hosts/globs; an empty list
#     blocks all external fetches even when the caller has cite_web.
#   * Auto-append is content-free: only "(N) <canonical-URL> [hash:sha256:HEX]"
#     lands in the document — no fetched titles, no surrounding context.
#   * Every cite attempt (success or denied) is recorded to cite_audit_log.
#
# Known limitation: the HTTPS fetcher is a plain Node `undici` GET + cheerio
# HTML parse — NO JavaScript execution. Pages that build content client-side
# (single-page apps, paywalled / Cloudflare-challenged / lazy-loaded
# content) will return mostly-empty HTML and the agent's quote will fail to
# verify even when a human in a browser sees it. v1 surfaces this as
# `not_found`; we do not pretend to be a browser.
citation:
  enabled: false                          # Master switch — must be true to use doc_cite.
  section_heading: "Citations"            # Heading text for the auto-appended Citations section.
  section_position: "end"                 # Where the Citations section is created when absent.
  web_appends_propose: false              # If true, auto-append goes through the proposal queue (per-root override).

  fetch:
    https_only: true                      # Reject plain http:// even if allowlisted.
    http_allowlist: []                    # Empty = no external fetches. Globs allowed (e.g. "*.forbes.com").
    block_private_ranges: true            # Reject DNS-resolved private/loopback/link-local/cloud-metadata IPs.
    allowed_content_types:
      - text/html
      - text/plain
      - text/markdown
      - application/json
      - application/xhtml+xml
    timeout_ms: 10000
    max_bytes: 5000000                    # 5 MB raw body cap.
    max_redirects: 3                      # v1 refuses to follow redirects entirely; reserved for phase 2.
    decompression_factor: 5               # Decompression-bomb guard: cap = max_bytes * factor.
    strip_query: true                     # Drop ?... from cited URL before fetch + before persistence.
    strip_fragment: true                  # Drop #... likewise.
    allow_userinfo: false                 # Reject user:pass@host outright.
    max_path_chars: 2048
    max_host_chars: 253
    secret_pattern_reject: true           # Defence-in-depth: reject sk-/ghp_/JWT/etc patterns in URL.

  rate_limit:
    external_per_minute: 30               # Per-caller cap on external citation attempts.

# Logging
logging:
  level: info                         # error | warn | info | debug
  dir: null                           # null = stderr only; set a path for file logging
  # dir: /app/logs                    # Docker: mount a volume at /app/logs

# Caller permissions (RBAC)
# Each caller has a unique ID, optional API key, and scoped permissions.
# Paths use root-prefixed notation: "docs/**", "skills/triage.md"
#
# Default posture is least privilege: read + search only. Grant write,
# propose, or approve explicitly per caller and per scope. Broad `**`
# grants plus a shared `default` caller are convenient for stdio /
# single-user setups but dangerous under HTTP transport — any
# unauthenticated request would inherit those rights. Under HTTP, every
# caller MUST also set `key: "sk-..."` (enforced at server startup).
callers:
  default:
    scopes:
      - path: "**"
        permissions:
          - read
          - search

  # Example: broad-access editor (stdio only — do not copy verbatim into
  # an HTTP deployment without also setting `key`)
  # editor:
  #   scopes:
  #     - path: "**"
  #       permissions: [read, write, propose, search]

  # Example: read-only analyst
  # analyst:
  #   key: "sk-analyst-..."
  #   scopes:
  #     - path: "**"
  #       permissions:
  #         - read
  #         - search

  # Example: scoped agent with different permissions per root
  # michelle:
  #   key: "sk-michelle-ops-..."
  #   scopes:
  #     - path: "docs/sops/**"
  #       permissions: [read, write, propose, search]
  #     - path: "skills/**"
  #       permissions: [read, propose, search]
  #     - path: "memory/**"
  #       permissions: [read, write, search]

  # Example: research caller with local-only citation (cite, no cite_web).
  # Can verify quotes against en-quire managed sources and write Citations
  # into docs/, but cannot fetch external URLs even if `citation.enabled` is
  # true.
  # researcher:
  #   key: "sk-researcher-..."
  #   scopes:
  #     - path: "docs/**"
  #       permissions: [read, search, cite]

  # Example: web-enabled research caller (cite + cite_web).
  # Can verify against external https URLs subject to the `http_allowlist`
  # under `citation.fetch`. cite_web is the governed-egress permission —
  # treat it like network-fetch elsewhere in the deployment.
  # web-researcher:
  #   key: "sk-web-researcher-..."
  #   scopes:
  #     - path: "docs/**"
  #       permissions: [read, search, cite, cite_web]

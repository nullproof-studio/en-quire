# en-quire configuration
# Copy this file to en-quire.config.yaml and adjust as needed.

# Document roots — named mount points into en-quire's unified namespace.
# Each root has its own path, git config, and description.
# Files are addressed with a root prefix: docs/article.md, skills/triage.md
document_roots:
  docs:
    path: /data/docs
    description: "Main documentation"
    git:
      # enabled: null                 # Auto-detect (checks for .git directory)
      auto_commit: true               # Commit on every write operation
      remote: null                    # Optional: push proposals to remote
      pr_hook: null                   # Optional: webhook URL or shell command run after a propose write
      pr_hook_secret: null            # Optional: HMAC-SHA256 secret signing webhook bodies (X-EnQuire-Signature)

  # Example: a second root for agent skill files
  # skills:
  #   path: /data/skills
  #   description: "Agent skill files — governed"
  #   git:
  #     enabled: true
  #     auto_commit: true

  # Example: a root without git (session memory, scratch)
  # memory:
  #   path: /data/memory
  #   description: "Session memory files"
  #   git:
  #     enabled: false

# Database path (defaults to .enquire.db next to this config file)
# database: /data/enquire.db

# Optimistic locking — require agents to pass an ETag (from a prior read) on writes.
# Prevents stale writes and writes without reading. Agents receive the etag from
# doc_outline, doc_read_section, doc_read, or doc_find_replace preview.
require_read_before_write: true     # default: true. Set false to disable.

# Server transport
transport: stdio                    # stdio | streamable-http
port: 3100                          # Port for streamable-http transport

# HTTP bind interface. Defaults to loopback so flipping to streamable-http
# doesn't accidentally expose the server on every interface. Override to
# "0.0.0.0" only if you intend network exposure — in that case every
# caller MUST have a strong `key` (enforced at startup, min 32 chars).
listen_host: "127.0.0.1"

# Search configuration
search:
  fulltext: true                    # Full-text search via SQLite FTS5 (always on)
  sync_on_start: blocking           # "blocking" (default) or "background" (use for 100k+ docs)
  batch_size: 500                   # Files per index transaction batch
  semantic:
    enabled: false                  # Opt-in semantic vector search (sqlite-vec + OpenAI-compatible embeddings)
    # Base URL of an OpenAI-compatible embeddings endpoint. The client
    # appends "/embeddings". Examples:
    #   OpenAI:           https://api.openai.com/v1
    #   LM Studio:        http://localhost:1234/v1
    #   Ollama (compat):  http://localhost:11434/v1
    #   text-embeddings-inference:  http://localhost:8080
    endpoint: "https://api.openai.com/v1"
    model: "text-embedding-3-small" # 1536 dims hosted; nomic-embed-text (768) on local servers
    dimensions: 1536
    # Auth: prefer api_key_env so secrets stay out of committed config.
    # If both are set, the env var wins.
    api_key: null
    api_key_env: null               # e.g. "OPENAI_API_KEY"

# Logging
logging:
  level: info                         # error | warn | info | debug
  dir: null                           # null = stderr only; set a path for file logging
  # dir: /app/logs                    # Docker: mount a volume at /app/logs

# Caller permissions (RBAC)
# Each caller has a unique ID, optional API key, and scoped permissions.
# Paths use root-prefixed notation: "docs/**", "skills/triage.md"
#
# Default posture is least privilege: read + search only. Grant write,
# propose, or approve explicitly per caller and per scope. Broad `**`
# grants plus a shared `default` caller are convenient for stdio /
# single-user setups but dangerous under HTTP transport — any
# unauthenticated request would inherit those rights. Under HTTP, every
# caller MUST also set `key: "sk-..."` (enforced at server startup).
callers:
  default:
    scopes:
      - path: "**"
        permissions:
          - read
          - search

  # Example: broad-access editor (stdio only — do not copy verbatim into
  # an HTTP deployment without also setting `key`)
  # editor:
  #   scopes:
  #     - path: "**"
  #       permissions: [read, write, propose, search]

  # Example: read-only analyst
  # analyst:
  #   key: "sk-analyst-..."
  #   scopes:
  #     - path: "**"
  #       permissions:
  #         - read
  #         - search

  # Example: scoped agent with different permissions per root
  # michelle:
  #   key: "sk-michelle-ops-..."
  #   scopes:
  #     - path: "docs/sops/**"
  #       permissions: [read, write, propose, search]
  #     - path: "skills/**"
  #       permissions: [read, propose, search]
  #     - path: "memory/**"
  #       permissions: [read, write, search]
